# 误插 U 盘时直接从本机硬盘启动已安装系统
menuentry "从本地硬盘启动  (Boot from local disk)" {
        insmod chain
        insmod part_gpt
        insmod part_msdos
        insmod fat
        if [ "${grub_platform}" = "efi" ]; then
                # 用 search 的返回码判断(旧写法靠 $root 是否为空不可靠:search 失败不会清空
                # $root,而 $root 启动时已指向 live 介质、永远非空 → 总去 chainload 不存在的
                # Windows 引导器报错)。按已安装系统的特征引导器逐一查找,避开 live 自身的
                # /EFI/BOOT:ZFS 根=ZFSBootMenu,普通安装=GRUB,另兼容 Windows 双启动。
                if search --file --no-floppy --set=root /EFI/zbm/vmlinuz.EFI; then
                        chainloader /EFI/zbm/vmlinuz.EFI
                elif search --file --no-floppy --set=root /EFI/Gentoo/grubx64.efi; then
                        chainloader /EFI/Gentoo/grubx64.efi
                elif search --file --no-floppy --set=root /EFI/Microsoft/Boot/bootmgfw.efi; then
                        chainloader /EFI/Microsoft/Boot/bootmgfw.efi
                else
                        echo "未在本地硬盘找到已安装系统的引导器。"
                        echo "若刚安装完成,请拔出安装介质后直接重启(固件会进 ZFSBootMenu / GRUB);"
                        echo "或重启时用固件启动菜单(F12 / Esc / F8 等)选本地硬盘。"
                        echo ""
                        echo "No installed-system bootloader found on local disk."
                        echo "If you just finished installing, remove the install media and reboot."
                        echo "Press any key to return to the menu..."
                        read _
                fi
        else
                set root=(hd0)
                chainloader +1
        fi
}
