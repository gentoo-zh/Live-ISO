set timeout=30
set default=0
set pager=1

# 【关键】CJK 字体是 /boot/grub/fonts/unicode.pf2(GNU Unifont,含中日韩)。
# 旧 cfg 误写 /boot/grub/font.pf2(不存在)→ loadfont 失败 → 无 gfxterm → 中文看不到。
# 用对路径后 gfxterm 启用、中文/繁体菜单正常显示(UEFI 与 BIOS 皆可)。
if loadfont /boot/grub/fonts/unicode.pf2 ; then
        set gfxmode=auto
        insmod efi_gop
        insmod efi_uga
        insmod all_video
        insmod gfxterm
        terminal_output gfxterm
fi

# 语言由 gigos.lang= 内核参数控制(gigos-live-lang.service 在 sddm 前据此设
# 系统 locale + Plasma 界面语言 + LANG)。下面顶层三档=各语言默认开源 nouveau 启动,
# 覆盖绝大多数情况;timeout 自动进第一个(简体 nouveau)。特殊显卡/内存模式放进
# 三个子菜单,每个都含简/繁/英三语 → 任意语言×任意模式都能组合(繁体也能选 nvidia/内存)。
#
# 【显卡:常规加载,不走 early KMS】nvidia 不进 initramfs。为不破坏 nouveau/AMD/Intel:
#   - 闭源 NVIDIA 项:传 gigos.gpu=nvidia(由 gigos-nvidia-load.service 在 sddm 前正常 modprobe
#     nvidia 四件套 + 建 /dev/nvidia* 节点;此时 udev 已就绪、节点正常创建——比 early KMS 可靠)
#     + rd.driver.blacklist=nouveau / modprobe.blacklist=nouveau(整程不加载 nouveau)
#     + nvidia-drm.modeset=1。用 modprobe.blacklist=nouveau(而非 module_blacklist),以便 calamares
#     shellprocess_nvidia 靠 /proc/cmdline 探测到"用户选了闭源",给装好系统写 nvidia modeset drop-in。
#     注意:闭源模块未签名,需在 BIOS 关闭 Secure Boot 才能加载(否则被内核拒绝)。
#   - 其余所有项:rd.driver.blacklist=nvidia* + modprobe.blacklist=nvidia* 阻止 nvidia 加载,
#     nouveau / AMD / Intel 照常工作。

menuentry "简体中文  (默认 / 开源 nouveau)" {
        set gfxpayload=keep
        linux /boot/kernel root=live:CDLABEL=Gig-OS rd.live.image gigos.lang=zh_CN rd.driver.blacklist=nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm modprobe.blacklist=nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm quiet splash
        initrd /boot/initrd
}
menuentry "正體中文（臺灣）  (开源 nouveau)" {
        set gfxpayload=keep
        linux /boot/kernel root=live:CDLABEL=Gig-OS rd.live.image gigos.lang=zh_TW rd.driver.blacklist=nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm modprobe.blacklist=nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm quiet splash
        initrd /boot/initrd
}
menuentry "English  (open-source nouveau)" {
        set gfxpayload=keep
        linux /boot/kernel root=live:CDLABEL=Gig-OS rd.live.image gigos.lang=en_US rd.driver.blacklist=nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm modprobe.blacklist=nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm quiet splash
        initrd /boot/initrd
}

submenu "闭源 NVIDIA 驱动 (RTX 20/30/40/50 · 需关闭 Secure Boot)  ▸  简 / 繁 / EN" {
        menuentry "闭源 NVIDIA  +  简体中文   (需关 Secure Boot)" {
                set gfxpayload=keep
                linux /boot/kernel root=live:CDLABEL=Gig-OS rd.live.image gigos.lang=zh_CN gigos.gpu=nvidia rd.driver.blacklist=nouveau modprobe.blacklist=nouveau nouveau.modeset=0 nvidia-drm.modeset=1
                initrd /boot/initrd
        }
        menuentry "闭源 NVIDIA  +  正體中文（臺灣）   (需关 Secure Boot)" {
                set gfxpayload=keep
                linux /boot/kernel root=live:CDLABEL=Gig-OS rd.live.image gigos.lang=zh_TW gigos.gpu=nvidia rd.driver.blacklist=nouveau modprobe.blacklist=nouveau nouveau.modeset=0 nvidia-drm.modeset=1
                initrd /boot/initrd
        }
        menuentry "Proprietary NVIDIA  +  English   (disable Secure Boot)" {
                set gfxpayload=keep
                linux /boot/kernel root=live:CDLABEL=Gig-OS rd.live.image gigos.lang=en_US gigos.gpu=nvidia rd.driver.blacklist=nouveau modprobe.blacklist=nouveau nouveau.modeset=0 nvidia-drm.modeset=1
                initrd /boot/initrd
        }
}

